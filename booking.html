<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A96E;--gold-light:#E8D4A8;--gold-dark:#8A6B3A;
  --black:#0A0A0A;--dark:#111111;--dark2:#1A1A1A;--dark3:#242424;
  --gray:#888888;--white:#FFFFFF;
  --font-display:'Cormorant Garamond',serif;--font-body:'Montserrat',sans-serif;
}
body{background:var(--black);color:var(--white);font-family:var(--font-body);font-weight:300;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:2px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 3rem;background:rgba(10,10,10,0.97);border-bottom:1px solid rgba(201,169,110,0.1)}
.nav-logo{font-family:var(--font-display);font-size:1.8rem;font-weight:500;color:var(--gold);letter-spacing:0.15em;text-decoration:none}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{color:var(--white);text-decoration:none;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:500;transition:color 0.2s;opacity:0.85}
.nav-links a:hover,.nav-links a.active{color:var(--gold);opacity:1}
.nav-menu-btn{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:4px}
.nav-menu-btn span{display:block;width:24px;height:1px;background:var(--white)}
.mobile-nav{display:none;position:fixed;inset:0;background:var(--black);z-index:200;flex-direction:column;justify-content:flex-start;padding:5.5rem 2rem 2rem}
.mobile-nav.open{display:flex}
.mobile-nav a{color:var(--white);text-decoration:none;font-family:var(--font-body);font-size:1.15rem;font-weight:400;letter-spacing:0.08em;padding:1.3rem 0.5rem;border-bottom:1px solid rgba(201,169,110,0.12);transition:color 0.2s}
.mobile-nav a:first-of-type{color:var(--gold)}
.mobile-nav a:hover{color:var(--gold)}
.mobile-nav .mobile-cta{margin-top:2.5rem;background:var(--gold);color:var(--black);text-align:center;font-family:var(--font-body);font-size:0.95rem;font-weight:600;letter-spacing:0.05em;padding:1.2rem;border:none;border-radius:14px}
.mobile-nav .mobile-cta:hover{background:var(--gold-light);color:var(--black)}
.mobile-nav-close{position:absolute;top:1.5rem;right:1.8rem;background:none;border:none;color:var(--white);font-size:1.6rem;cursor:pointer;line-height:1}
.page-header{padding:10rem 3rem 4rem;border-bottom:1px solid rgba(201,169,110,0.1)}
.page-label{font-size:0.6rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:1rem}
.page-title{font-family:var(--font-display);font-size:clamp(2.5rem,5vw,4rem);font-weight:300;line-height:1.1}

/* INFO BANNER */
.info-banner{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:rgba(201,169,110,0.1);border-bottom:1px solid rgba(201,169,110,0.1)}
.info-item{padding:1.5rem 2rem;background:var(--dark)}
.info-item-label{font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);font-weight:600;margin-bottom:0.4rem}
.info-item-value{font-size:0.85rem;color:var(--white);font-weight:400;letter-spacing:0.05em}
.info-item-value em{color:var(--gold);font-style:normal;font-weight:600}

.booking-layout{display:grid;grid-template-columns:1fr 420px;min-height:calc(100vh - 280px)}
.booking-left{padding:3rem;border-right:1px solid rgba(255,255,255,0.06)}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.cal-month{font-family:var(--font-display);font-size:1.5rem;font-weight:300;letter-spacing:0.05em}
.cal-nav{display:flex;gap:0.5rem}
.cal-nav button{background:none;border:1px solid rgba(201,169,110,0.3);color:var(--gold);width:36px;height:36px;cursor:pointer;font-size:1rem;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:rgba(201,169,110,0.1)}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:0.5rem}
.cal-days-header span{text-align:center;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:0.5rem 0;font-weight:500}
.cal-days-header span.party-day{color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:400;cursor:pointer;position:relative;transition:all 0.2s;border-radius:2px;color:rgba(255,255,255,0.5)}
.cal-cell.party{color:var(--white);font-weight:500;flex-direction:column;gap:2px;aspect-ratio:auto;padding:6px 2px}
.cal-cell.party::after{display:none}
.cal-cell.party:hover{background:rgba(201,169,110,0.15);color:var(--gold)}
.cal-badge{font-size:0.45rem;font-weight:700;letter-spacing:0.05em;padding:1px 5px;border-radius:3px;background:rgba(201,169,110,0.25);color:var(--gold);border:1px solid rgba(201,169,110,0.4);line-height:1.4;text-align:center}
.cal-badge-soon{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.4);animation:urgentPulse 1.5s ease-in-out infinite}
.cal-badge-male{background:rgba(99,102,241,0.2);color:#818cf8;border:1px solid rgba(99,102,241,0.4)}
.cal-badge-female{background:rgba(244,114,182,0.2);color:#f472b6;border:1px solid rgba(244,114,182,0.4)}
.cal-badge-closed{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.1)}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:0.5}}
.cal-cell.selected{background:var(--gold);color:var(--black);font-weight:600}
.cal-cell.selected .cal-badge{background:rgba(0,0,0,0.25);color:var(--black)}
.cal-cell.today{border:1px solid rgba(201,169,110,0.4)}
.cal-cell.past{opacity:0.2;cursor:not-allowed;pointer-events:none}
.cal-loading-msg{grid-column:1/-1;text-align:center;padding:2.5rem 1rem;color:rgba(255,255,255,0.3);font-size:0.72rem;letter-spacing:0.15em}

/* TICKET TYPE */
.slots-section{margin-top:3rem}
.slots-title{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:1.5rem}
.ticket-types{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,0.05)}
.ticket-card{background:var(--dark);padding:1.8rem 2rem;cursor:pointer;transition:background 0.2s;border:2px solid transparent;display:grid;grid-template-columns:1fr auto;align-items:center;gap:1rem}
.ticket-card:hover{background:var(--dark2)}
.ticket-card.selected{border-color:var(--gold);background:rgba(201,169,110,0.05)}
.ticket-name{font-family:var(--font-display);font-size:1.2rem;font-weight:400;color:var(--white);margin-bottom:0.3rem}
.ticket-desc{font-size:0.65rem;color:rgba(255,255,255,0.35);letter-spacing:0.1em;font-weight:300}
.ticket-prices{text-align:right}
.ticket-price-row{font-size:0.7rem;color:rgba(255,255,255,0.5);margin-bottom:0.2rem}
.ticket-price-row span{color:var(--white);font-weight:500}
.ticket-price-row.highlight span{color:var(--gold)}
.no-date{text-align:center;padding:4rem 2rem;color:rgba(255,255,255,0.2);font-family:var(--font-display);font-size:1.2rem;font-weight:300;line-height:1.8}

/* RIGHT PANEL */
.booking-right{padding:3rem 2.5rem;background:var(--dark);position:sticky;top:80px;height:fit-content;max-height:calc(100vh - 80px);overflow-y:auto}
.order-title{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:2rem}
.order-summary{background:var(--dark2);padding:1.5rem;margin-bottom:2rem;min-height:80px}
.order-summary-empty{font-size:0.75rem;color:rgba(255,255,255,0.2);font-style:italic;font-family:var(--font-display);font-size:1rem;line-height:1.7}
.order-date{font-family:var(--font-display);font-size:1.4rem;font-weight:300;color:var(--white);margin-bottom:0.3rem}
.order-slot-info{font-size:0.65rem;color:rgba(255,255,255,0.5);letter-spacing:0.1em}
.form-group{margin-bottom:1.5rem}
.form-label{display:block;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:500;margin-bottom:0.6rem}
.form-required{color:var(--gold)}
.form-input,.form-select{width:100%;background:var(--dark3);border:1px solid rgba(255,255,255,0.1);color:var(--white);padding:0.9rem 1rem;font-family:var(--font-body);font-size:0.8rem;font-weight:300;outline:none;transition:border-color 0.2s;appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.form-input::placeholder{color:rgba(255,255,255,0.2)}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.08)}
.gender-btn{background:var(--dark3);padding:0.9rem;text-align:center;cursor:pointer;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.5);font-weight:500;transition:all 0.2s;border:2px solid transparent;font-family:var(--font-body)}
.gender-btn:hover{background:var(--dark2);color:var(--white)}
.gender-btn.selected{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,0.05)}
.price-table{border-top:1px solid rgba(255,255,255,0.06);margin:2rem 0 1.5rem;padding-top:1.5rem}
.price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.8rem}
.price-key{font-size:0.7rem;color:rgba(255,255,255,0.4);font-weight:400}
.price-val{font-size:0.8rem;color:var(--white);font-weight:500}
.price-extra{border-top:1px solid rgba(255,255,255,0.06);padding-top:0.8rem;margin-top:0.5rem}
.price-total{border-top:1px solid rgba(201,169,110,0.2);padding-top:1rem;margin-top:1rem}
.price-total .price-key{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);font-weight:600}
.price-total .price-val{font-family:var(--font-display);font-size:1.5rem;font-weight:400;color:var(--gold)}
.extra-toggle{display:flex;align-items:center;gap:0.8rem;cursor:pointer;padding:0.8rem 0}
.extra-toggle input{width:18px;height:18px;accent-color:var(--gold);cursor:pointer}
.extra-toggle-label{font-size:0.75rem;color:rgba(255,255,255,0.6);font-weight:300}
.extra-toggle-label strong{color:var(--white);font-weight:500}
.submit-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:1.1rem;font-family:var(--font-body);font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:all 0.3s;margin-top:0.5rem}
.submit-btn:hover{background:var(--gold-light);transform:translateY(-1px)}
.submit-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.form-notice{font-size:0.6rem;color:rgba(255,255,255,0.2);line-height:1.8;margin-top:1rem;font-weight:300}

/* APPROVAL BADGE */
.approval-badge{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;padding:0.35rem 0.8rem;border:1px solid rgba(201,169,110,0.3);margin-bottom:1.5rem}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:center;justify-content:center;padding:2rem}
.modal-overlay.open{display:flex}
.modal{background:var(--dark);border:1px solid rgba(201,169,110,0.3);padding:3rem;max-width:480px;width:100%;text-align:center;max-height:90vh;overflow-y:auto}
.modal-icon{font-family:var(--font-display);font-size:3rem;color:var(--gold);margin-bottom:1rem}
.modal-title{font-family:var(--font-display);font-size:1.8rem;font-weight:300;margin-bottom:1rem}
.modal-body{font-size:0.75rem;color:rgba(255,255,255,0.5);line-height:1.8;margin-bottom:2rem;font-weight:300}
.modal-account{background:var(--dark2);padding:1.5rem;margin-bottom:2rem;text-align:left}
.modal-account-label{font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:0.8rem}
.modal-account-info{font-size:0.8rem;line-height:2.2;color:rgba(255,255,255,0.7)}
.modal-account-info strong{color:var(--white);font-weight:500}
.modal-close{background:none;border:1px solid rgba(201,169,110,0.4);color:var(--gold);padding:0.8rem 2.5rem;font-family:var(--font-body);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:all 0.2s}
.modal-close:hover{background:rgba(201,169,110,0.1)}

/* NOTICE */
.age-notice{font-size:0.65rem;color:rgba(255,255,255,0.3);margin-top:0.4rem;line-height:1.5}

@media(max-width:900px){.booking-layout{grid-template-columns:1fr}.booking-right{position:static;max-height:none}}
@media(max-width:600px){nav{padding:1.2rem 1.5rem}.nav-links{display:none}.nav-menu-btn{display:flex}.page-header{padding:6rem 1.5rem 1.5rem}.page-title{font-size:1.8rem}.booking-left,.booking-right{padding:1.2rem 1.2rem}.info-banner{grid-template-columns:1fr 1fr}.info-item{padding:0.9rem 1rem}.ticket-card{grid-template-columns:1fr;gap:0.8rem}.ticket-prices{text-align:left}.cal-header{margin-bottom:1rem}.cal-month{font-size:1.2rem}.cal-grid{gap:1px}.cal-cell{font-size:0.72rem}.cal-cell.party{padding:4px 1px;gap:1px}.cal-badge{font-size:0.4rem;padding:1px 3px}.cal-days-header span{padding:0.3rem 0;font-size:0.55rem}}
</style>

<script>
const PARTY_DAYS = [0,5,6];
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzsAYlOdww4z4MBjiEtZvPgrn6_-wUvyy98niITt8y6INKgwOJBieRNhKidLVt_GFZHQg/exec';
let currentYear, currentMonth;
let selectedDate = null;
let dateStatusMap = {};

async function init(){
  const now=new Date();
  currentYear=now.getFullYear(); currentMonth=now.getMonth();
  renderCalendar(); // 즉시 렌더링 (기본 배지로)
  try {
    const res = await fetch(GAS_URL + '?action=getDateStatus');
    const json = await res.json();
    if(json.result === 'success') dateStatusMap = json.data || {};
  } catch(e) {}
  renderCalendar(); // GAS 데이터 반영하여 배지 업데이트
}

function renderCalendar(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonth').textContent=currentYear+'년 '+months[currentMonth];
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const today=new Date();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-cell';grid.appendChild(e)}
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div'); cell.className='cal-cell';
    const date=new Date(currentYear,currentMonth,d);
    const dow=date.getDay();
    const isPast=date<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    if(isPast){ cell.classList.add('past'); cell.textContent=d; }
    else if(PARTY_DAYS.includes(dow)){
      cell.classList.add('party');
      const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const st = dateStatusMap[dateStr] || {};
      const maleSt = st.male || '정상';
      const femaleSt = st.female || '정상';
      const bothClosed = maleSt==='마감' && femaleSt==='마감';
      const diffDays = Math.ceil((date - new Date(today.getFullYear(),today.getMonth(),today.getDate())) / (1000*60*60*24));

      if(bothClosed){
        cell.classList.add('past');
        cell.innerHTML=`<span>${d}</span><span class="cal-badge cal-badge-closed">마감</span>`;
      } else {
        let badge;
        if(maleSt==='마감' && femaleSt!=='마감'){
          badge=`<span class="cal-badge cal-badge-male">남마감</span>`;
        } else if(femaleSt==='마감' && maleSt!=='마감'){
          badge=`<span class="cal-badge cal-badge-female">여마감</span>`;
        } else if(maleSt==='마감임박'||femaleSt==='마감임박'||diffDays<=3){
          badge=`<span class="cal-badge cal-badge-soon">마감임박</span>`;
        } else {
          badge=`<span class="cal-badge">부산</span>`;
        }
        cell.innerHTML=`<span>${d}</span>${badge}`;
        cell.onclick=()=>selectDate(currentYear,currentMonth,d,dow);
        cell.ondblclick=()=>{selectDate(currentYear,currentMonth,d,dow);window.location.href=`party.html?date=${dateStr}`;};
      }
    } else { cell.textContent=d; }
    if(d===today.getDate()&&currentMonth===today.getMonth()&&currentYear===today.getFullYear()) cell.classList.add('today');
    if(selectedDate&&selectedDate.year===currentYear&&selectedDate.month===currentMonth&&selectedDate.day===d) cell.classList.add('selected');
    grid.appendChild(cell);
  }
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++}
  if(currentMonth<0){currentMonth=11;currentYear--}
  renderCalendar();
}

function selectDate(year,month,day,dow){
  selectedDate={year,month,day,dow};
  renderCalendar();
  // 오른쪽 요약 업데이트
  const dayNames=['일','월','화','수','목','금','토'];
  const el=document.getElementById('orderSummary');
  el.innerHTML=`
    <div class="order-date">${year}년 ${month+1}월 ${day}일 (${dayNames[dow]})</div>
    <div class="order-slot-info">부산 부경대점 · 탭하여 상세보기</div>`;
}

function submitBooking(){
  if(!selectedDate){alert('날짜를 선택해주세요.');return}
  const dateStr=`${selectedDate.year}-${String(selectedDate.month+1).padStart(2,'0')}-${String(selectedDate.day).padStart(2,'0')}`;
  window.location.href=`party.html?date=${dateStr}`;
}

function toggleMenu(){document.getElementById('mobileNav').classList.toggle('open')}
init();
</script>
